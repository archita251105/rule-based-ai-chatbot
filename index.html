<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaMind — AI Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ░░ BACKGROUND ░░ -->
  <div class="bg-wrap" aria-hidden="true">
    <div class="bg-orb o1"></div>
    <div class="bg-orb o2"></div>
    <div class="bg-orb o3"></div>
    <div class="bg-orb o4"></div>
    <div class="bg-grid"></div>
    <!-- Floating sparkle particles -->
    <div class="sparks">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- ░░ 3D TILT WRAPPER ░░ -->
  <div class="tilt-wrap" id="tiltWrap">
    <main class="chat-card" id="chatCard" role="main">

      <!-- Rainbow top-edge shine -->
      <div class="card-shine" aria-hidden="true"></div>

      <!-- ── HEADER ── -->
      <header class="chat-header">

        <!-- Left: avatar + name -->
        <div class="header-left">
          <div class="cube-wrap" aria-hidden="true">
            <div class="cube">
              <div class="face front">N</div>
              <div class="face back">M</div>
              <div class="face left">★</div>
              <div class="face right">♦</div>
              <div class="face top">A</div>
              <div class="face bottom">I</div>
            </div>
            <span class="online-dot"></span>
          </div>
          <div class="header-text">
            <h1 class="bot-name">Nova<span>Mind</span></h1>
            <p class="bot-status">
              <span class="pulse-dot" aria-hidden="true"></span>
              Online · AI Assistant
            </p>
          </div>
        </div>

        <!-- Centre: live date + time -->
        <div class="header-clock" id="headerClock" aria-live="polite">
          <div class="clock-time" id="clockTime">12:00 PM</div>
          <div class="clock-date" id="clockDate">Monday, Jan 1, 2024</div>
        </div>

        <!-- Right: action buttons -->
        <div class="header-actions">
          <button id="themeBtn" class="icon-btn" title="Toggle light / dark" aria-label="Toggle theme">
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1"  x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
          <button id="downloadBtn" class="icon-btn" title="Download chat" aria-label="Download chat history">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
          <button id="clearBtn" class="icon-btn" title="Clear chat" aria-label="Clear all messages">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- ── CHAT WINDOW ── -->
      <section class="chat-window" id="chatWindow"
               role="log" aria-live="polite" aria-label="Chat messages">
      </section>

      <!-- ── QUICK CHIPS ── -->
      <div class="suggestions" id="suggestions" aria-label="Quick suggestions">
        <button class="chip" data-msg="Tell me a joke">😂 Joke</button>
        <button class="chip" data-msg="Give me a motivational quote">💪 Quote</button>
        <button class="chip" data-msg="Tell me a fun fact">🧠 Fun Fact</button>
        <button class="chip" data-msg="What is the current time and date?">🕐 Date &amp; Time</button>
        <button class="chip" data-msg="Calculate 48 * 3">🔢 Calculator</button>
        <button class="chip" data-msg="What can you do?">✨ Features</button>
      </div>

      <!-- ── INPUT ROW ── -->
      <footer class="input-row">
        <button id="ttsBtn" class="icon-btn tts-btn" title="Toggle text-to-speech" aria-label="Toggle TTS" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path id="ttsWave" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
        <div class="input-wrap">
          <input type="text" id="userInput"
            placeholder="Ask me anything…"
            autocomplete="off" aria-label="Type your message" maxlength="300" />
        </div>
        <button id="sendBtn" class="send-btn" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </footer>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
